services:
  requestlens:
    build:
      context: .
      args:
        GO_IMAGE: "${REQUESTLENS_GO_IMAGE:-golang:1.23-bookworm}"
        RUNTIME_IMAGE: "${REQUESTLENS_RUNTIME_IMAGE:-debian:bookworm-slim}"
        GOPROXY: "${GOPROXY:-https://goproxy.cn,direct}"
    container_name: requestlens
    user: "${REQUESTLENS_UID:-10001}:${REQUESTLENS_GID:-10001}"
    ports:
      - "${REQUESTLENS_PORT:-8080}:8080"
    environment:
      REQUESTLENS_ADDR: ":8080"
      REQUESTLENS_DB_PATH: "/data/requestlens.db"
      REQUESTLENS_DEFAULT_MAX_BODY_SIZE: "${REQUESTLENS_DEFAULT_MAX_BODY_SIZE:-0}"
      REQUESTLENS_LOG_RETENTION_DAYS: "14"
    volumes:
      - "${REQUESTLENS_DATA_DIR:-./data}:/data"
    restart: unless-stopped
